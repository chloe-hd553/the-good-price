<!--
  ════════════════════════════════════════════════════════════
  SNIPPET DE TRACKING V2 — À coller dans systeme.io
  (remplace l'ancienne version)
  ════════════════════════════════════════════════════════════

  Ce script enregistre :
    - La visite de la page (page_view) avec source UTM
    - Chaque clic CTA : texte du bouton + URL de destination
    - Un session_id pour calculer le taux de rebond
-->
<script>
(function () {
  var API_URL = 'https://the-good-price.vercel.app/api/track';

  // ── Session ID unique par visite ──────────────────────────────────
  var sessionId = (Math.random().toString(36).slice(2) + Date.now().toString(36));

  // ── Paramètres UTM dans l'URL ─────────────────────────────────────
  function getUTM() {
    try {
      var p = new URLSearchParams(window.location.search);
      return {
        source:   p.get('utm_source')   || 'systemeio',
        medium:   p.get('utm_medium')   || null,
        campaign: p.get('utm_campaign') || null,
        referrer: document.referrer     || null
      };
    } catch (e) {
      return { source: 'systemeio', medium: null, campaign: null, referrer: null };
    }
  }

  // ── Envoi à l'API (sans bloquer la page) ─────────────────────────
  function track(payload) {
    try {
      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
        keepalive: true
      }).catch(function () {});
    } catch (e) {}
  }

  // ── Texte lisible d'un élément (nettoie les espaces) ─────────────
  function getLabel(el) {
    try {
      return (el.innerText || el.textContent || '').replace(/\s+/g, ' ').trim().slice(0, 80);
    } catch (e) { return ''; }
  }

  // ── 1. Visite de la page ──────────────────────────────────────────
  var utm = getUTM();
  track({
    event:      'page_view',
    session_id: sessionId,
    source:     utm.source,
    medium:     utm.medium,
    campaign:   utm.campaign,
    referrer:   utm.referrer
  });

  // ── 2. Clic sur un lien vers l'appli ─────────────────────────────
  document.addEventListener('click', function (e) {
    // Remonte jusqu'au <a> le plus proche
    var el = e.target;
    while (el && el.tagName !== 'A') el = el.parentElement;

    if (el && el.href && el.href.indexOf('the-good-price') !== -1) {
      // Cherche le texte du bouton dans le lien ou son enfant direct
      var labelEl = el.querySelector('button, span, div') || el;
      var label   = getLabel(labelEl) || getLabel(el) || '(bouton)';

      // Extrait juste le chemin de l'URL (ex: "/choix-plan")
      var dest = '';
      try {
        var url  = new URL(el.href);
        dest = url.pathname + (url.search || '');
      } catch (e) { dest = el.href; }

      track({
        event:       'cta_click',
        session_id:  sessionId,
        label:       label,
        destination: dest,
        source:      utm.source,
        medium:      utm.medium,
        campaign:    utm.campaign,
        referrer:    utm.referrer
      });
    }
  }, true);

})();
</script>
