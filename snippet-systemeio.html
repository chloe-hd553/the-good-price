<!--
  ════════════════════════════════════════════════════════════
  SNIPPET DE TRACKING — À coller dans le champ HTML de systeme.io
  (footer ou section "code personnalisé" de la page fiche produit)
  ════════════════════════════════════════════════════════════

  Ce script :
    1) enregistre une visite (page_view) à chaque chargement de page
    2) enregistre un clic CTA (cta_click) quand quelqu'un clique
       sur un lien vers the-good-price.vercel.app
    3) transmet la source UTM si elle est dans l'URL
       (ex: ?utm_source=meta&utm_medium=paid&utm_campaign=lancement)
-->
<script>
(function () {
  var API_URL = 'https://the-good-price.vercel.app/api/track';

  // Lire les paramètres UTM dans l'URL de la page systeme.io
  function getUTM() {
    try {
      var p = new URLSearchParams(window.location.search);
      return {
        source:   p.get('utm_source')   || 'systemeio',
        medium:   p.get('utm_medium')   || null,
        campaign: p.get('utm_campaign') || null,
        referrer: document.referrer     || null
      };
    } catch (e) {
      return { source: 'systemeio', medium: null, campaign: null, referrer: null };
    }
  }

  // Envoyer un événement à l'API (sans bloquer la page)
  function track(eventName) {
    try {
      var utm = getUTM();
      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          event:    eventName,
          source:   utm.source,
          medium:   utm.medium,
          campaign: utm.campaign,
          referrer: utm.referrer
        }),
        keepalive: true
      }).catch(function () { /* silencieux si erreur réseau */ });
    } catch (e) { /* silencieux */ }
  }

  // ── 1. Visite de la page ──────────────────────────────────────────
  track('page_view');

  // ── 2. Clic sur le bouton CTA (lien vers l'appli) ────────────────
  document.addEventListener('click', function (e) {
    // Remonte jusqu'au <a> le plus proche du clic
    var el = e.target;
    while (el && el.tagName !== 'A') el = el.parentElement;
    if (el && el.href && el.href.indexOf('the-good-price') !== -1) {
      track('cta_click');
    }
  }, true);

})();
</script>
